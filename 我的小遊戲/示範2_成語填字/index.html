<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>成語填字</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f5e6bd;
      --paper-deep: #e7cf98;
      --ink: #2d2219;
      --muted: #745b3f;
      --red: #b52121;
      --red-soft: #d9503f;
      --green: #2f8f55;
      --wood: #d8ad69;
      --wood-dark: #9c6a32;
      --gold: #c9953c;
      --cream: #fff7df;
      --shadow: rgba(89, 59, 25, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Serif TC", "PMingLiU", "MingLiU", serif;
      background:
        radial-gradient(circle at 16% 12%, rgba(255, 255, 255, 0.42), transparent 13rem),
        radial-gradient(circle at 82% 18%, rgba(201, 149, 60, 0.16), transparent 14rem),
        repeating-linear-gradient(0deg, rgba(116, 91, 63, 0.035) 0 2px, transparent 2px 18px),
        repeating-linear-gradient(90deg, rgba(116, 91, 63, 0.025) 0 1px, transparent 1px 24px),
        linear-gradient(135deg, #f8edcf 0%, var(--paper) 55%, #ecd29c 100%);
      overflow-x: hidden;
    }

    .map-link {
      position: fixed;
      left: 14px;
      top: 14px;
      z-index: 50;
      padding: 9px 13px;
      border: 2px solid rgba(181, 33, 33, 0.32);
      border-radius: 8px;
      background: rgba(255, 247, 223, 0.92);
      color: var(--red);
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(89, 59, 25, 0.18);
    }

    .page {
      width: min(1080px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 38px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      padding: 20px 0 22px;
      border-bottom: 2px solid rgba(181, 33, 33, 0.24);
    }

    h1 {
      margin: 0;
      color: #3b281b;
      font-size: clamp(2.3rem, 7vw, 5rem);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.58);
    }

    .intro {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1.04rem;
    }

    .progress {
      min-width: 150px;
      padding: 12px 16px;
      border: 2px solid rgba(181, 33, 33, 0.28);
      border-radius: 8px;
      background: rgba(255, 247, 223, 0.82);
      box-shadow: 0 12px 28px var(--shadow);
      text-align: center;
      font-weight: 900;
    }

    .progress span {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .progress strong {
      display: block;
      color: var(--red);
      font-size: 2rem;
      line-height: 1.08;
    }

    .game {
      margin-top: 24px;
      padding: clamp(16px, 3vw, 28px);
      border: 3px double rgba(80, 47, 20, 0.32);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.06)),
        rgba(255, 248, 226, 0.72);
      box-shadow: 0 18px 55px var(--shadow), inset 0 0 0 1px rgba(255, 255, 255, 0.32);
    }

    .idiom-board {
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 2vw, 16px);
      padding: 22px 12px;
      border-radius: 8px;
      background:
        repeating-linear-gradient(45deg, rgba(181, 33, 33, 0.035) 0 2px, transparent 2px 16px),
        rgba(255, 252, 241, 0.74);
      border: 1px solid rgba(116, 91, 63, 0.22);
    }

    .fixed-char,
    .blank {
      width: clamp(58px, 14vw, 102px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      font-size: clamp(2.2rem, 8vw, 4.6rem);
      font-weight: 900;
      line-height: 1;
    }

    .fixed-char {
      color: #20150f;
    }

    .blank {
      position: relative;
      border: 3px solid var(--red);
      color: rgba(181, 33, 33, 0.32);
      background:
        linear-gradient(45deg, transparent calc(50% - 1px), rgba(181, 33, 33, 0.24) calc(50% - 1px), rgba(181, 33, 33, 0.24) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(-45deg, transparent calc(50% - 1px), rgba(181, 33, 33, 0.24) calc(50% - 1px), rgba(181, 33, 33, 0.24) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(90deg, transparent calc(50% - 1px), rgba(181, 33, 33, 0.2) calc(50% - 1px), rgba(181, 33, 33, 0.2) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(0deg, transparent calc(50% - 1px), rgba(181, 33, 33, 0.2) calc(50% - 1px), rgba(181, 33, 33, 0.2) calc(50% + 1px), transparent calc(50% + 1px)),
        rgba(255, 248, 232, 0.92);
      box-shadow: inset 0 0 0 1px rgba(181, 33, 33, 0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .blank.over {
      transform: translateY(-3px);
      box-shadow: 0 0 0 5px rgba(181, 33, 33, 0.13), inset 0 0 0 1px rgba(181, 33, 33, 0.18);
    }

    .blank.correct {
      color: var(--red);
      background:
        radial-gradient(circle, rgba(181, 33, 33, 0.12), transparent 62%),
        rgba(255, 244, 220, 0.94);
      animation: stamp 0.3s ease;
    }

    .answer-panel {
      min-height: 104px;
      margin-top: 18px;
      padding: 16px;
      border: 1px solid rgba(47, 143, 85, 0.28);
      border-radius: 8px;
      background: rgba(255, 252, 241, 0.62);
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .answer-panel.show {
      display: flex;
    }

    .answer-panel h2 {
      margin: 0 0 6px;
      color: var(--green);
      font-size: 1.7rem;
      letter-spacing: 0;
    }

    .answer-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .cards-wrap {
      margin-top: 22px;
    }

    .cards-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-weight: 700;
    }

    .card-bank {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      min-height: 220px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid rgba(116, 91, 63, 0.18);
      background:
        repeating-linear-gradient(90deg, rgba(156, 106, 50, 0.08) 0 8px, rgba(216, 173, 105, 0.08) 8px 16px),
        rgba(255, 247, 223, 0.68);
    }

    .word-card {
      height: 58px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(156, 106, 50, 0.42);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(156, 106, 50, 0.1), transparent 22%, rgba(156, 106, 50, 0.08) 60%, transparent),
        linear-gradient(180deg, #f7dfaa, #e5bd74);
      color: #17100b;
      font-size: 2rem;
      font-weight: 900;
      cursor: grab;
      user-select: none;
      touch-action: none;
      box-shadow: 0 7px 0 rgba(122, 78, 32, 0.22), 0 12px 18px rgba(74, 48, 22, 0.12);
      transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
    }

    .word-card:active {
      cursor: grabbing;
    }

    .word-card.dragging {
      opacity: 0.88;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 50;
      width: var(--drag-width);
      pointer-events: none;
      transform: translate3d(var(--drag-x), var(--drag-y), 0) scale(1.04);
      box-shadow: 0 15px 36px rgba(74, 48, 22, 0.28);
    }

    .word-card.locked {
      opacity: 0;
      pointer-events: none;
    }

    .word-card.wrong {
      animation: wrong 0.2s ease;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      padding: 10px 18px;
      color: #fff9e8;
      background: linear-gradient(180deg, #c93c32, var(--red));
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 #7d1717;
      white-space: nowrap;
    }

    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #7d1717;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(45, 34, 25, 0.54);
      z-index: 70;
    }

    .overlay.show {
      display: grid;
    }

    .result {
      width: min(460px, 100%);
      padding: 30px;
      border: 3px double rgba(181, 33, 33, 0.5);
      border-radius: 8px;
      background:
        repeating-linear-gradient(0deg, rgba(116, 91, 63, 0.045) 0 2px, transparent 2px 16px),
        var(--cream);
      box-shadow: 0 24px 72px rgba(47, 30, 15, 0.34);
      text-align: center;
    }

    .result h2 {
      margin: 0 0 10px;
      color: var(--red);
      font-size: clamp(2rem, 7vw, 3.3rem);
      letter-spacing: 0;
    }

    .result p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 1.15rem;
      font-weight: 700;
    }

    @keyframes stamp {
      0% {
        transform: scale(1.28) rotate(-4deg);
        opacity: 0.45;
      }
      100% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    @keyframes wrong {
      0%, 100% {
        box-shadow: 0 7px 0 rgba(122, 78, 32, 0.22), 0 12px 18px rgba(74, 48, 22, 0.12);
        border-color: rgba(156, 106, 50, 0.42);
      }
      50% {
        box-shadow: 0 0 0 6px rgba(181, 33, 33, 0.26), 0 7px 0 rgba(122, 78, 32, 0.22);
        border-color: var(--red-soft);
      }
    }

    @media (max-width: 760px) {
      header {
        grid-template-columns: 1fr;
      }

      .progress {
        width: 100%;
      }

      .card-bank {
        display: flex;
        overflow-x: auto;
        min-height: 102px;
        scroll-snap-type: x proximity;
      }

      .word-card {
        flex: 0 0 64px;
        scroll-snap-align: start;
      }

      .answer-panel.show {
        align-items: stretch;
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .idiom-board {
        gap: 6px;
        padding-inline: 6px;
      }

      .fixed-char,
      .blank {
        width: clamp(48px, 20vw, 72px);
      }
    }
  </style>
</head>
<body>
  <a class="map-link" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <div class="page">
    <header>
      <div>
        <h1>成語填字</h1>
        <p class="intro">拖曳字卡到紅色米字格中，補完成語。每場隨機 5 題。</p>
      </div>
      <div class="progress" aria-live="polite">
        <span>目前題數</span>
        <strong id="questionNo">1 / 5</strong>
      </div>
    </header>

    <main class="game">
      <section class="idiom-board" id="idiomBoard" aria-label="成語填字區"></section>

      <section class="answer-panel" id="answerPanel">
        <div>
          <h2>✓ 答對！</h2>
          <p id="meaningText"></p>
        </div>
        <button class="btn" id="nextBtn" type="button">下一題</button>
      </section>

      <section class="cards-wrap">
        <div class="cards-title">
          <span>字卡</span>
          <span>拖到上方空格</span>
        </div>
        <div class="card-bank" id="cardBank" aria-label="可拖曳字卡"></div>
      </section>
    </main>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
    <div class="result">
      <h2 id="resultTitle">挑戰完成</h2>
      <p id="resultText">你完成了 5 題。</p>
      <button class="btn" id="restartBtn" type="button">重新挑戰</button>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      { 成語: "一鳴驚人", 缺字: [1, 2], 答案: ["鳴", "驚"], 意思: "比喻平時默默無聞，突然有驚人表現。" },
      { 成語: "風花雪月", 缺字: [1, 3], 答案: ["花", "月"], 意思: "原指四時景色，後比喻浮華空洞的詩文。" },
      { 成語: "三番五次", 缺字: [1, 3], 答案: ["番", "次"], 意思: "形容次數很多。" },
      { 成語: "一字千金", 缺字: [1, 3], 答案: ["字", "金"], 意思: "形容文字價值極高。" },
      { 成語: "畫龍點睛", 缺字: [1, 3], 答案: ["龍", "睛"], 意思: "比喻在關鍵處點明要旨。" },
      { 成語: "守株待兔", 缺字: [1, 3], 答案: ["株", "兔"], 意思: "比喻拘泥舊法或妄想不勞而獲。" },
      { 成語: "亡羊補牢", 缺字: [1, 3], 答案: ["羊", "牢"], 意思: "比喻出了問題後及時補救，還不算太晚。" },
      { 成語: "杯弓蛇影", 缺字: [1, 2], 答案: ["弓", "蛇"], 意思: "比喻疑神疑鬼，自相驚擾。" },
      { 成語: "井底之蛙", 缺字: [1, 3], 答案: ["底", "蛙"], 意思: "比喻見識狹小的人。" },
      { 成語: "草木皆兵", 缺字: [1, 3], 答案: ["木", "兵"], 意思: "形容人在驚慌時疑神疑鬼。" },
      { 成語: "刻舟求劍", 缺字: [1, 3], 答案: ["舟", "劍"], 意思: "比喻拘泥成法，不知隨情勢改變。" },
      { 成語: "濫竽充數", 缺字: [1, 3], 答案: ["竽", "數"], 意思: "比喻沒有真才實學的人混在行家裡充數。" }
    ];

    const DISTRACTORS = "天地山水日月風雲花草鳥魚龍虎馬牛心手口目耳春夏秋冬東西南北金木火土竹石書劍明清唐宋秦漢";
    const ROUND_TOTAL = 5;

    const idiomBoard = document.querySelector("#idiomBoard");
    const cardBank = document.querySelector("#cardBank");
    const questionNo = document.querySelector("#questionNo");
    const answerPanel = document.querySelector("#answerPanel");
    const meaningText = document.querySelector("#meaningText");
    const nextBtn = document.querySelector("#nextBtn");
    const overlay = document.querySelector("#overlay");
    const resultText = document.querySelector("#resultText");
    const restartBtn = document.querySelector("#restartBtn");

    let roundQuestions = [];
    let currentIndex = 0;
    let filledCount = 0;
    let audioCtx = null;
    let dragState = null;

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function tone(frequency, duration, delay = 0) {
      if (!audioCtx) return;
      const start = audioCtx.currentTime + delay;
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.12, start + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      oscillator.start(start);
      oscillator.stop(start + duration + 0.03);
    }

    function playCorrect() {
      tone(660, 0.1);
      tone(880, 0.12, 0.08);
      tone(1180, 0.14, 0.16);
    }

    function makeChoices(question) {
      const answers = [...question.答案];
      const blocked = new Set([...answers, ...question.成語]);
      const distractors = [...new Set([...DISTRACTORS])].filter((char) => !blocked.has(char));
      return shuffle([...answers, ...shuffle(distractors).slice(0, 13)]);
    }

    function renderQuestion() {
      const question = roundQuestions[currentIndex];
      filledCount = 0;
      idiomBoard.innerHTML = "";
      cardBank.innerHTML = "";
      answerPanel.classList.remove("show");
      questionNo.textContent = `${currentIndex + 1} / ${ROUND_TOTAL}`;

      [...question.成語].forEach((char, index) => {
        const missingIndex = question.缺字.indexOf(index);
        if (missingIndex >= 0) {
          const blank = document.createElement("div");
          blank.className = "blank";
          blank.textContent = "□";
          blank.dataset.answer = question.答案[missingIndex];
          blank.dataset.filled = "false";
          idiomBoard.appendChild(blank);
        } else {
          const fixed = document.createElement("div");
          fixed.className = "fixed-char";
          fixed.textContent = char;
          idiomBoard.appendChild(fixed);
        }
      });

      makeChoices(question).forEach((char) => {
        const card = document.createElement("button");
        card.className = "word-card";
        card.type = "button";
        card.textContent = char;
        card.dataset.char = char;
        cardBank.appendChild(card);
        attachDrag(card);
      });
    }

    function attachDrag(card) {
      card.addEventListener("pointerdown", (event) => {
        if (card.classList.contains("locked")) return;
        ensureAudio();
        event.preventDefault();
        const rect = card.getBoundingClientRect();
        dragState = {
          card,
          startX: event.clientX,
          startY: event.clientY,
          offsetX: event.clientX - rect.left,
          offsetY: event.clientY - rect.top,
          originParent: card.parentElement,
          originNext: card.nextSibling,
          width: rect.width
        };
        card.setPointerCapture(event.pointerId);
        card.style.setProperty("--drag-width", `${rect.width}px`);
        card.classList.add("dragging");
        moveCard(event.clientX, event.clientY);
      });

      card.addEventListener("pointermove", (event) => {
        if (!dragState || dragState.card !== card) return;
        event.preventDefault();
        moveCard(event.clientX, event.clientY);
        highlightBlank(event.clientX, event.clientY);
      });

      card.addEventListener("pointerup", (event) => {
        if (!dragState || dragState.card !== card) return;
        finishDrag(event.clientX, event.clientY);
      });

      card.addEventListener("pointercancel", () => {
        if (!dragState || dragState.card !== card) return;
        resetCard(card);
        dragState = null;
      });
    }

    function moveCard(x, y) {
      const left = x - dragState.offsetX;
      const top = y - dragState.offsetY;
      dragState.card.style.setProperty("--drag-x", `${left}px`);
      dragState.card.style.setProperty("--drag-y", `${top}px`);
    }

    function blankAtPoint(x, y) {
      const card = dragState.card;
      card.style.display = "none";
      const element = document.elementFromPoint(x, y);
      card.style.display = "";
      return element && element.closest(".blank");
    }

    function highlightBlank(x, y) {
      document.querySelectorAll(".blank.over").forEach((blank) => blank.classList.remove("over"));
      const blank = blankAtPoint(x, y);
      if (blank && blank.dataset.filled === "false") {
        blank.classList.add("over");
      }
    }

    function finishDrag(x, y) {
      document.querySelectorAll(".blank.over").forEach((blank) => blank.classList.remove("over"));
      const card = dragState.card;
      const blank = blankAtPoint(x, y);

      if (blank && blank.dataset.filled === "false" && blank.dataset.answer === card.dataset.char) {
        blank.textContent = card.dataset.char;
        blank.dataset.filled = "true";
        blank.classList.add("correct");
        card.classList.add("locked");
        resetCard(card, false);
        filledCount += 1;
        playCorrect();

        if (filledCount === 2) {
          showAnswer();
        }
      } else {
        resetCard(card);
        flashWrong(card);
      }

      dragState = null;
    }

    function resetCard(card, restore = true) {
      card.classList.remove("dragging");
      card.style.removeProperty("--drag-x");
      card.style.removeProperty("--drag-y");
      card.style.removeProperty("--drag-width");
      if (restore && dragState && dragState.originParent) {
        dragState.originParent.insertBefore(card, dragState.originNext);
      }
    }

    function flashWrong(card) {
      card.classList.remove("wrong");
      void card.offsetWidth;
      card.classList.add("wrong");
      setTimeout(() => card.classList.remove("wrong"), 220);
    }

    function showAnswer() {
      const question = roundQuestions[currentIndex];
      meaningText.textContent = question.意思;
      nextBtn.textContent = currentIndex === ROUND_TOTAL - 1 ? "看總成績" : "下一題";
      answerPanel.classList.add("show");
    }

    function nextQuestion() {
      if (currentIndex === ROUND_TOTAL - 1) {
        localStorage.setItem("cert_idiom", "true");
        resultText.textContent = `你完成了 ${ROUND_TOTAL} 題，全部答對！`;
        overlay.classList.add("show");
        return;
      }

      currentIndex += 1;
      renderQuestion();
    }

    function startGame() {
      roundQuestions = shuffle(QUESTIONS).slice(0, ROUND_TOTAL);
      currentIndex = 0;
      overlay.classList.remove("show");
      renderQuestion();
    }

    nextBtn.addEventListener("click", nextQuestion);
    restartBtn.addEventListener("click", startGame);
    startGame();
  </script>
</body>
</html>
