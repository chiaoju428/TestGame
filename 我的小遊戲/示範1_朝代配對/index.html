<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>朝代配對</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #140d0b;
      --panel: #201411;
      --panel-soft: #2c1b16;
      --gold: #d9ad58;
      --gold-bright: #ffd983;
      --paper: #f5e3b8;
      --paper-deep: #e8c985;
      --red: #b83a2c;
      --red-bright: #e85c49;
      --green: #3f9a62;
      --ink: #2d1d15;
      --text: #fff2cf;
      --muted: #d7bf8a;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Noto Serif TC", "PMingLiU", "MingLiU", serif;
      background:
        radial-gradient(circle at 20% 12%, rgba(217, 173, 88, 0.18), transparent 18rem),
        radial-gradient(circle at 84% 18%, rgba(184, 58, 44, 0.16), transparent 16rem),
        repeating-linear-gradient(90deg, rgba(255, 217, 131, 0.035) 0 1px, transparent 1px 34px),
        linear-gradient(135deg, #0f0908 0%, #1b100d 52%, #28150f 100%);
      overflow-x: hidden;
    }

    .map-link {
      position: fixed;
      left: 14px;
      top: 14px;
      z-index: 50;
      padding: 9px 13px;
      border: 1px solid var(--gold);
      border-radius: 8px;
      background: rgba(20, 13, 11, 0.88);
      color: var(--gold-bright);
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.26);
    }

    .page {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 38px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      padding: 24px 0 20px;
      border-bottom: 1px solid rgba(217, 173, 88, 0.34);
    }

    h1 {
      margin: 0;
      color: var(--gold-bright);
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 4px 0 rgba(0, 0, 0, 0.28);
    }

    .intro {
      margin: 12px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 1.04rem;
    }

    .counter {
      min-width: 138px;
      padding: 12px 16px;
      border: 1px solid var(--gold);
      border-radius: 8px;
      background: rgba(32, 20, 17, 0.86);
      box-shadow: 0 12px 32px var(--shadow);
      text-align: center;
    }

    .counter span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .counter strong {
      display: block;
      color: var(--gold-bright);
      font-size: 2rem;
      line-height: 1.1;
    }

    .game {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(310px, 0.75fr);
      gap: 22px;
      align-items: start;
      padding-top: 24px;
    }

    .dynasties,
    .events-panel {
      border: 1px solid rgba(217, 173, 88, 0.38);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 217, 131, 0.07), transparent),
        rgba(32, 20, 17, 0.86);
      box-shadow: 0 18px 52px var(--shadow);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(217, 173, 88, 0.22);
    }

    h2 {
      margin: 0;
      color: var(--gold-bright);
      font-size: 1.25rem;
      letter-spacing: 0;
    }

    .hint {
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .dynasty-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .dynasty-card {
      min-height: 190px;
      padding: 12px;
      border: 2px solid var(--gold);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.38), rgba(255, 255, 255, 0.04)),
        var(--paper);
      color: var(--ink);
      box-shadow: inset 0 0 0 1px rgba(87, 51, 20, 0.16), 0 8px 0 rgba(99, 56, 20, 0.2);
    }

    .dynasty-name {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(76, 44, 22, 0.26);
      color: #5c321c;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      line-height: 1;
    }

    .drop-zone {
      min-height: 102px;
      display: flex;
      align-content: flex-start;
      flex-wrap: wrap;
      gap: 7px;
      padding: 9px;
      border: 1px dashed rgba(92, 50, 28, 0.46);
      border-radius: 8px;
      background: rgba(255, 249, 232, 0.52);
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .drop-zone.over {
      border-color: var(--red);
      background: rgba(255, 223, 172, 0.86);
      transform: translateY(-2px);
    }

    .events-panel {
      position: sticky;
      top: 16px;
      overflow: hidden;
    }

    .events-list {
      min-height: 480px;
      display: grid;
      gap: 10px;
      padding: 16px;
      align-content: start;
    }

    .event-card {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 48px;
      padding: 10px 12px;
      border: 2px solid var(--red);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(232, 92, 73, 0.14), transparent),
        #231310;
      color: #fff4d8;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: grab;
      user-select: none;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, opacity 0.16s ease;
    }

    .event-card:active {
      cursor: grabbing;
    }

    .event-card.dragging {
      opacity: 0.45;
      transform: scale(0.98);
    }

    .event-card.wrong {
      animation: wrongFlash 0.3s ease;
    }

    .event-card.matched {
      min-height: 34px;
      padding: 6px 8px;
      border-color: #8fd8a9;
      background:
        linear-gradient(135deg, rgba(143, 216, 169, 0.22), transparent),
        var(--green);
      color: #f7fff2;
      font-size: 0.82rem;
      cursor: default;
      box-shadow: 0 4px 10px rgba(26, 86, 50, 0.22);
    }

    .event-card.matched .event-icon {
      font-size: 1rem;
    }

    .event-icon {
      flex: 0 0 auto;
      width: 1.4em;
      text-align: center;
      font-size: 1.22rem;
      line-height: 1;
    }

    .event-text {
      min-width: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(12, 7, 5, 0.72);
      z-index: 30;
    }

    .overlay.show {
      display: grid;
      animation: goldFlash 0.86s ease;
    }

    .result {
      width: min(480px, 100%);
      padding: 32px;
      border: 2px solid var(--gold-bright);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 217, 131, 0.22), transparent 12rem),
        var(--panel);
      box-shadow: 0 0 34px rgba(255, 217, 131, 0.36), 0 28px 80px rgba(0, 0, 0, 0.48);
      text-align: center;
    }

    .result h2 {
      font-size: clamp(2rem, 8vw, 3.3rem);
      margin-bottom: 12px;
    }

    .result p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 1.18rem;
    }

    .restart {
      border: 1px solid var(--gold-bright);
      border-radius: 8px;
      padding: 10px 20px;
      color: #2d1d15;
      background: linear-gradient(180deg, #ffe39b, var(--gold));
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 0 rgba(100, 59, 25, 0.42);
    }

    @keyframes wrongFlash {
      0%, 100% {
        transform: translateX(0);
        border-color: var(--red);
      }
      25% {
        transform: translateX(-8px);
        border-color: #ffdfdf;
        background: #8b1f1a;
      }
      55% {
        transform: translateX(8px);
        border-color: #ffdfdf;
      }
    }

    @keyframes goldFlash {
      0% {
        box-shadow: inset 0 0 0 rgba(255, 217, 131, 0);
      }
      40% {
        box-shadow: inset 0 0 120px rgba(255, 217, 131, 0.48);
      }
      100% {
        box-shadow: inset 0 0 0 rgba(255, 217, 131, 0);
      }
    }

    @media (max-width: 820px) {
      header {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .counter {
        width: 100%;
      }

      .game {
        grid-template-columns: 1fr;
      }

      .events-panel {
        position: static;
      }

      .events-list {
        min-height: 0;
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding-bottom: 18px;
        scroll-snap-type: x proximity;
      }

      .events-list .event-card {
        min-width: 190px;
        scroll-snap-align: start;
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 20px, 1180px);
        padding-top: 16px;
      }

      .dynasty-grid {
        grid-template-columns: 1fr;
      }

      .section-head {
        align-items: start;
        flex-direction: column;
      }

      .hint {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <a class="map-link" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <div class="page">
    <header>
      <div>
        <h1>朝代配對</h1>
        <p class="intro">把右邊的歷史事件拖曳到正確朝代。正確會鎖定在朝代格內，全部完成即可過關。</p>
      </div>
      <div class="counter" aria-live="polite">
        <span>嘗試次數</span>
        <strong id="attempts">0</strong>
      </div>
    </header>

    <main class="game">
      <section class="dynasties" aria-label="朝代配對區">
        <div class="section-head">
          <h2>朝代</h2>
          <span class="hint">每個朝代可放多張事件卡</span>
        </div>
        <div class="dynasty-grid" id="dynastyGrid"></div>
      </section>

      <aside class="events-panel" aria-label="事件卡區">
        <div class="section-head">
          <h2>事件卡</h2>
          <span class="hint" id="remainingText">尚有 16 張</span>
        </div>
        <div class="events-list" id="eventsList"></div>
      </aside>
    </main>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="result">
      <h2 id="winTitle">過關！</h2>
      <p id="winMessage">你總共嘗試了 0 次。</p>
      <button class="restart" id="restartBtn" type="button">再玩一次</button>
    </div>
  </div>

  <script>
    const dynasties = [
      { id: 1, name: "秦" },
      { id: 2, name: "漢" },
      { id: 3, name: "唐" },
      { id: 4, name: "宋" },
      { id: 5, name: "明" },
      { id: 6, name: "清" }
    ];

    const events = [
      { id: "e1", dynasty_id: 1, text: "統一六國", icon: "⚔️" },
      { id: "e2", dynasty_id: 1, text: "修築萬里長城", icon: "🧱" },
      { id: "e3", dynasty_id: 1, text: "焚書坑儒", icon: "🔥" },
      { id: "e4", dynasty_id: 2, text: "張騫通西域", icon: "🐪" },
      { id: "e5", dynasty_id: 2, text: "文景之治", icon: "📜" },
      { id: "e6", dynasty_id: 2, text: "罷黜百家獨尊儒術", icon: "📖" },
      { id: "e7", dynasty_id: 3, text: "貞觀之治", icon: "👑" },
      { id: "e8", dynasty_id: 3, text: "安史之亂", icon: "💥" },
      { id: "e9", dynasty_id: 3, text: "玄奘西行取經", icon: "🧘" },
      { id: "e10", dynasty_id: 4, text: "王安石變法", icon: "📜" },
      { id: "e11", dynasty_id: 4, text: "岳飛抗金", icon: "🗡️" },
      { id: "e12", dynasty_id: 5, text: "鄭和下西洋", icon: "⛵" },
      { id: "e13", dynasty_id: 5, text: "永樂大典編成", icon: "📚" },
      { id: "e14", dynasty_id: 6, text: "鴉片戰爭", icon: "💣" },
      { id: "e15", dynasty_id: 6, text: "康熙盛世", icon: "🌅" },
      { id: "e16", dynasty_id: 6, text: "辛亥革命終結", icon: "🏛️" }
    ];

    const dynastyGrid = document.querySelector("#dynastyGrid");
    const eventsList = document.querySelector("#eventsList");
    const attemptsEl = document.querySelector("#attempts");
    const remainingText = document.querySelector("#remainingText");
    const overlay = document.querySelector("#overlay");
    const winMessage = document.querySelector("#winMessage");
    const restartBtn = document.querySelector("#restartBtn");

    let attempts = 0;
    let matchedCount = 0;
    let draggedCard = null;

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updateStatus() {
      attemptsEl.textContent = attempts;
      remainingText.textContent = `尚有 ${events.length - matchedCount} 張`;
    }

    function makeEventCard(event) {
      const card = document.createElement("div");
      card.className = "event-card";
      card.draggable = true;
      card.dataset.eventId = event.id;
      card.dataset.dynastyId = event.dynasty_id;
      card.innerHTML = `<span class="event-icon">${event.icon}</span><span class="event-text">${event.text}</span>`;

      card.addEventListener("dragstart", (eventObject) => {
        if (card.classList.contains("matched")) {
          eventObject.preventDefault();
          return;
        }

        draggedCard = card;
        card.classList.add("dragging");
        eventObject.dataTransfer.effectAllowed = "move";
        eventObject.dataTransfer.setData("text/plain", card.dataset.eventId);
      });

      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        draggedCard = null;
      });

      return card;
    }

    function makeDynastyCard(dynasty) {
      const card = document.createElement("section");
      card.className = "dynasty-card";
      card.innerHTML = `
        <div class="dynasty-name">${dynasty.name}</div>
        <div class="drop-zone" data-dynasty-id="${dynasty.id}" aria-label="${dynasty.name}朝事件掉落區"></div>
      `;

      const dropZone = card.querySelector(".drop-zone");

      dropZone.addEventListener("dragover", (eventObject) => {
        eventObject.preventDefault();
        eventObject.dataTransfer.dropEffect = "move";
        dropZone.classList.add("over");
      });

      dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("over");
      });

      dropZone.addEventListener("drop", (eventObject) => {
        eventObject.preventDefault();
        dropZone.classList.remove("over");
        handleDrop(dropZone);
      });

      return card;
    }

    function markWrong(card) {
      card.classList.remove("wrong");
      void card.offsetWidth;
      card.classList.add("wrong");
      setTimeout(() => card.classList.remove("wrong"), 320);
    }

    function handleDrop(dropZone) {
      if (!draggedCard) return;

      attempts += 1;
      const targetDynastyId = Number(dropZone.dataset.dynastyId);
      const cardDynastyId = Number(draggedCard.dataset.dynastyId);

      if (targetDynastyId === cardDynastyId) {
        draggedCard.classList.add("matched");
        draggedCard.draggable = false;
        dropZone.appendChild(draggedCard);
        matchedCount += 1;
        updateStatus();

        if (matchedCount === events.length) {
          setTimeout(showWin, 220);
        }
        return;
      }

      updateStatus();
      markWrong(draggedCard);
    }

    function renderGame() {
      attempts = 0;
      matchedCount = 0;
      draggedCard = null;
      dynastyGrid.innerHTML = "";
      eventsList.innerHTML = "";
      overlay.classList.remove("show");

      dynasties.forEach((dynasty) => {
        dynastyGrid.appendChild(makeDynastyCard(dynasty));
      });

      shuffle(events).forEach((event) => {
        eventsList.appendChild(makeEventCard(event));
      });

      updateStatus();
    }

    function showWin() {
      localStorage.setItem("cert_dynasty", "true");
      winMessage.textContent = `你總共嘗試了 ${attempts} 次。`;
      overlay.classList.add("show");
    }

    restartBtn.addEventListener("click", renderGame);
    renderGame();
  </script>
</body>
</html>
